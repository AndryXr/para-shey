<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Shey ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #05000a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lienzo de las flores brillantes (Estilo de la imagen image_1b7edf.jpg) */
        #canvas-flores {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor dinámico de globos */
        #contenedor-globos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Deja pasar los clics al pastel */
        }

        /* Globos de corazón detrás */
        .globo-corazon {
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: #ff3366;
            border-radius: 50%;
            bottom: -60px;
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.2), 0 5px 15px rgba(255,51,102,0.4);
            animation: subir Vertical linear forwards;
            opacity: 0.6;
        }
        .globo-corazon::before, .globo-corazon::after {
            content: "";
            position: absolute;
            width: 35px;
            height: 35px;
            background-color: inherit;
            border-radius: 50%;
        }
        .globo-corazon::before { top: -17px; left: 0; }
        .globo-corazon::after { left: -17px; top: 0; }

        @keyframes subir {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(25deg); opacity: 0; }
        }

        /* --- CONTENEDOR DEL PASTEL CENTRAL --- */
        .interfaz-cumple {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* El Pastel de Cumpleaños Animado en CSS */
        .pastel {
            position: relative;
            width: 180px;
            height: 140px;
            margin-top: 40px;
            cursor: pointer;
        }
        .piso {
            position: absolute;
            width: 100%;
            height: 60px;
            bottom: 0;
            background: #e07a5f;
            border-radius: 15px 15px 5px 5px;
            box-shadow: inset 0 5px 0 #f4a261;
        }
        .piso-superior {
            position: absolute;
            width: 140px;
            height: 50px;
            bottom: 55px;
            left: 20px;
            background: #f4a261;
            border-radius: 10px 10px 5px 5px;
            box-shadow: inset 0 5px 0 #fde2e4;
        }
        .crema {
            position: absolute;
            width: 100%;
            height: 15px;
            background: #fff;
            border-radius: 10px;
            top: -5px;
        }
        /* Vela y Llama */
        .vela {
            position: absolute;
            width: 8px;
            height: 35px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #ff3366 5px, #ff3366 10px);
            bottom: 105px;
            left: 86px;
            border-radius: 3px;
        }
        .llama {
            position: absolute;
            width: 16px;
            height: 24px;
            background: #ffb703;
            border-radius: 80% 0 55% 50% / 55% 0 80% 50%;
            transform: rotate(-45deg);
            bottom: 140px;
            left: 82px;
            box-shadow: 0 0 20px #ffb703;
            animation: parpadeo 0.6s infinite alternate;
            transition: opacity 0.5s ease;
        }
        @keyframes parpadeo {
            0% { transform: rotate(-45deg) scale(1); }
            100% { transform: rotate(-45deg) scale(1.15); }
        }

        /* Cartelito de Mensaje Corto emergente */
        .pop-mensaje {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            color: #ff3366;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 10;
            pointer-events: none;
            animation: flotarMensaje 2.5s ease-out forwards;
            text-align: center;
            max-width: 80%;
        }
        @keyframes flotarMensaje {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; top: 45%; left: 50%; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; top: 40%; left: 50%; }
            85% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; top: 30%; left: 50%; }
        }
    </style>
</head>
<body>

    <!-- Fondo de flores meciéndose (Estilo CSS/JS inspirado en la imagen) -->
    <canvas id="canvas-flores"></canvas>

    <!-- Capa intermedia con cientos de globos flotando -->
    <div id="contenedor-globos"></div>

    <!-- Elemento interactivo principal -->
    <div class="interfaz-cumple">
        <div class="pastel" onclick="tocarPastel()">
            <div class="llama" id="fuego-vela"></div>
            <div class="vela"></div>
            <div class="piso-superior"><div class="crema"></div></div>
            <div class="piso"><div class="crema"></div></div>
        </div>
    </div>

    <script>
        // --- TEXTOS CORTOS PARA MOSTRAR AL TOCAR EL PASTEL ---
        const frasesAmor = [
            "Eres la mujer más hermosa de todo el universo 😍",
            "¡Feliz Cumpleaños, mi reina hermosa! 🎂",
            "Te amo con todas las fuerzas de mi corazón ❤️",
            "Cada momento que paso a tu lado es mágico ✨",
            "Eres y siempre serás mi persona favorita 🧸",
            "Gracias por llenar mis días de tanta felicidad 🌹",
            "Me tienes locamente enamorado 🥰",
            "Tu hermosa sonrisa alegra mi mundo entero 💖",
            "Eres el regalo más lindo que me dio la vida 🌍",
            "Mi lugar seguro siempre será entre tus brazos 💞"
        ];

        let indiceMensaje = 0;

        function tocarPastel() {
            // Apaga la vela de forma realista en el primer toque
            const vela = document.getElementById('fuego-vela');
            if (vela.style.opacity !== '0') {
                vela.style.opacity = '0';
            }

            // Crear el mensaje emergente en el centro
            const cartel = document.createElement('div');
            cartel.classList.add('pop-mensaje');
            cartel.innerText = frasesAmor[indiceMensaje];
            
            document.body.appendChild(cartel);

            // Rotar los mensajes continuamente
            indiceMensaje = (indiceMensaje + 1) % frasesAmor.length;

            setTimeout(() => { cartel.remove(); }, 2500);
        }

        // --- LLUVIA DE CIENTOS DE GLOBOS DE CORAZÓN ---
        const contenedorGlobos = document.getElementById('contenedor-globos');
        const tonosRosa = ['#ff3366', '#ff5e7e', '#ff0040', '#ff85a1', '#ff4d6d'];

        function generarGlobo() {
            const globo = document.createElement('div');
            globo.classList.add('globo-corazon');
            globo.style.left = Math.random() * 95 + '%';
            
            const escala = Math.random() * 0.5 + 0.5; // Escalas variadas
            globo.style.transform = `scale(${escala})`;
            globo.style.backgroundColor = tonosRosa[Math.floor(Math.random() * tonosRosa.length)];

            const duracion = Math.random() * 5 + 4; // Velocidad constante
            globo.style.animationDuration = duracion + 's';

            contenedorGlobos.appendChild(globo);
            setTimeout(() => { globo.remove(); }, duracion * 1000);
        }
        // Genera un globo de manera ininterrumpida cada 100ms para llenar el fondo
        setInterval(generarGlobo, 100);


        // --- LÓGICA DE LAS FLORES BRILLANTES (Inspirado en la imagen image_1b7edf.jpg) ---
        const canvas = document.getElementById('canvas-flores');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        class FlorFondo {
            constructor(x) {
                this.x = x;
                this.altura = Math.random() * (height * 0.4) + (height * 0.4); // Altura de los tallos
                this.colorTallo = 'rgba(34, 139, 34, 0.25)';
                // Colores brillantes neón estilo la imagen
                const coloresFlor = ['#ff0055', '#ff5500', '#ff00aa', '#cc00ff', '#ff3300'];
                this.colorFlor = coloresFlor[Math.floor(Math.random() * coloresFlor.length)];
                this.faseViento = Math.random() * 100;
                this.velocidadViento = Math.random() * 0.02 + 0.01;
                this.radioFlor = Math.random() * 8 + 12;
            }

            dibujar(tiempo) {
                // Cálculo físico del balanceo simulado con ondas seno
                const balanceo = Math.sin(tiempo * this.velocidadViento + this.faseViento) * 25;
                const destinoX = this.x + balanceo;
                const destinoY = height - this.altura;

                // Dibujar el tallo curvo estilizado
                ctx.beginPath();
                ctx.strokeStyle = this.colorTallo;
                ctx.lineWidth = 2;
                ctx.moveTo(this.x, height);
                ctx.quadraticCurveTo(this.x + balanceo * 0.3, height - this.altura * 0.5, destinoX, destinoY);
                ctx.stroke();

                // Dibujar la cabeza de la flor con un resplandor de neón (Glow effect)
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.colorFlor;
                ctx.fillStyle = this.colorFlor;

                // Estilo pétalos abstractos superpuestos
                for (let i = 0; i < 5; i++) {
                    const angulo = (i * Math.PI * 2) / 5;
                    const px = destinoX + Math.cos(angulo) * (this.radioFlor * 0.6);
                    const py = destinoY + Math.sin(angulo) * (this.radioFlor * 0.6);
                    ctx.beginPath();
                    ctx.arc(px, py, this.radioFlor * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Centro de la flor brillante
                ctx.fillStyle = '#fffb00';
                ctx.beginPath();
                ctx.arc(destinoX, destinoY, this.radioFlor * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Crear una hilera densa de flores en la base de la pantalla
        const flores = [];
        const densidadFlores = Math.floor(width / 15); // Una flor cada 15 pixeles
        for (let i = 0; i < densidadFlores; i++) {
            flores.push(new FlorFondo(Math.random() * width));
        }

        let tiempo = 0;
        function bucleAnimacion() {
            // Fondo semitransparente oscuro para simular estelas de movimiento continuas
            ctx.fillStyle = 'rgba(5, 0, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);

            tiempo++;
            flores.forEach(flor => flor.dibujar(tiempo));

            requestAnimationFrame(bucleAnimacion);
        }
        bucleAnimacion();
    </script>
</body>
</html>
